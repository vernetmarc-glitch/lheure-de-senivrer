<!doctype html>
<html lang="fr">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Calibration plein écran — style de densité</title>
<style>
  html, body { margin: 0; padding: 0; background: #05050a; overflow: hidden; height: 100%; width: 100%; }
  canvas { position: absolute; top: 0; left: 0; width: 100%; height: 100%; display: block; }
  .gear {
    position: absolute; top: max(10px, env(safe-area-inset-top)); right: max(10px, env(safe-area-inset-right));
    width: 32px; height: 32px; border-radius: 16px; background: rgba(20,20,30,0.6);
    border: 1px solid rgba(255,255,255,0.15); color: #ccc; font-size: 15px; z-index: 10;
  }
  .panel {
    position: absolute; top: calc(max(10px, env(safe-area-inset-top)) + 40px); right: max(10px, env(safe-area-inset-right));
    background: rgba(15,15,22,0.92); border: 1px solid rgba(255,255,255,0.12); border-radius: 8px;
    padding: 10px; font-family: system-ui, sans-serif; color: #ccc; width: 220px; z-index: 10;
    max-height: 80dvh; overflow-y: auto;
  }
  .layerRow { display: flex; gap: 4px; flex-wrap: wrap; margin-bottom: 10px; }
  .layerRow button { background: transparent; border: 1px solid #333; color: #999; border-radius: 5px; padding: 3px 7px; font-size: 10px; }
  .layerRow button.active { background: #2a2a3a; color: #fff; }
  .ctrl { margin-bottom: 8px; }
  .ctrl label { font-size: 10px; color: #bbb; display: flex; justify-content: space-between; margin-bottom: 2px; }
  .ctrl label span.val { color: #7fd1ff; font-family: monospace; }
  .ctrl input[type=range] { width: 100%; }
  .stat { position: absolute; bottom: max(8px, env(safe-area-inset-bottom)); left: 8px; font-size: 10px; color: #777; font-family: monospace; z-index: 10; }
</style>
</head>
<body>
<canvas id="canvas"></canvas>
<button class="gear" id="gearBtn">⚙</button>
<div class="panel" id="panel" style="display:none;">
  <div class="layerRow" id="layerRow"></div>

  <div class="ctrl">
    <label>Zoom (demi-champ, Mpc) <span class="val" id="zoomVal"></span></label>
    <input type="range" id="zoomSlider" min="0" max="1" step="0.001" value="0.5" />
  </div>
  <div class="ctrl">
    <label>Contraste (gamma) <span class="val" id="gammaVal">0.65</span></label>
    <input type="range" id="gammaSlider" min="0.4" max="2.5" step="0.05" value="0.65" />
  </div>
  <div class="ctrl">
    <label>Adoucissement (vapeur) <span class="val" id="softVal">0.0</span></label>
    <input type="range" id="softSlider" min="0" max="8" step="0.2" value="0" />
  </div>
  <div class="ctrl">
    <label>Netteté filaments <span class="val" id="sharpVal">0.00</span></label>
    <input type="range" id="sharpSlider" min="0" max="3" step="0.05" value="0" />
  </div>
  <div class="ctrl">
    <label>Échelle de structure (rayon) <span class="val" id="sharpRadiusVal">2.5</span></label>
    <input type="range" id="sharpRadiusSlider" min="1" max="40" step="0.5" value="2.5" />
  </div>
  <div class="ctrl">
    <label>Halo (bloom) <span class="val" id="haloVal">0.00</span></label>
    <input type="range" id="haloSlider" min="0" max="2" step="0.05" value="0" />
  </div>
  <div class="ctrl">
    <label>Points (intensité) <span class="val" id="pointIntVal">1.00</span></label>
    <input type="range" id="pointIntSlider" min="0" max="3" step="0.05" value="1.0" />
  </div>
  <div class="ctrl">
    <label>Points (seuil) <span class="val" id="pointThreshVal">82.5</span></label>
    <input type="range" id="pointThreshSlider" min="80" max="99.5" step="0.5" value="82.5" />
  </div>
  <div class="ctrl">
    <label>Points (taille) <span class="val" id="pointSizeVal">1.0</span></label>
    <input type="range" id="pointSizeSlider" min="0.5" max="8" step="0.5" value="1.0" />
  </div>
</div>
<div class="stat" id="stat"></div>

<script>
const DPR = Math.min(window.devicePixelRatio || 1, 3);
const MARGIN_FACTOR = 1.5;
// L5 a une marge dédiée plus large (cf. app/src/DensityLayer.tsx et
// scripts/generate_layers.py) : c'est le seul layer visible pile à son bord
// extrême, sujet au letterboxing sur écrans très allongés sans cette marge.
const MARGIN_FACTOR_L5 = 2.4;
function marginFor(key) { return key === 'l5' ? MARGIN_FACTOR_L5 : MARGIN_FACTOR; }

const LAYERS = [
  // "milkyway" : texture pré-cuite (disque + bulbe uniquement), cf.
  // scripts/generate_simulated_textures.mjs — pas un champ de densité
  // continu, cf. l'entrée correspondante dans app/src/densityStyle.ts
  // (halo/points désactivés). Les 8 galaxies réelles nommées du Groupe
  // Local ne sont PAS ici : chacune a son propre sprite, composé par
  // RealGalaxiesLayer.tsx (pas géré par cet outil de calibration).
  { key: 'milkyway', maxMpc: 0.035075 },
  { key: 'localgroup', maxMpc: 2.4 },
  { key: 'l1b', maxMpc: 8.49 },
  { key: 'l2', maxMpc: 30 },
  { key: 'l2b', maxMpc: 67.08 },
  { key: 'l3', maxMpc: 150 },
  { key: 'l3b', maxMpc: 212.13 },
  { key: 'l4', maxMpc: 300 },
  { key: 'l4a', maxMpc: 793.73 },
  { key: 'l4b', maxMpc: 2100 },
  { key: 'l5a', maxMpc: 5531.46 },
  { key: 'l5', maxMpc: 14570 },
];
let currentLayerIdx = 4; // l3 par défaut (le plus filamenteux)

// Cohérent avec app/src/densityStyle.ts : paramètres calibrés par layer,
// PAS un unique jeu de valeurs partagé (cf. discussion du 6 juillet — une
// calibration écrasait la précédente sans stockage par layer).
const DEFAULT_PARAMS = { gamma: 0.75, soften: 0, sharpen: 0, sharpenRadius: 2.5, halo: 0.1, pointIntensity: 0.6, pointThreshold: 82, pointSize: 1.5 };
const PARAMS_BY_LAYER = {
  l2: { gamma: 0.85, soften: 0, sharpen: 0, sharpenRadius: 2.5, halo: 0.25, pointIntensity: 0.6, pointThreshold: 81.0, pointSize: 2.5 },
  l4: { gamma: 0.65, soften: 0, sharpen: 0, sharpenRadius: 2.5, halo: 0, pointIntensity: 1.0, pointThreshold: 82.5, pointSize: 1.0 },
};
function paramsForLayer(key) { return PARAMS_BY_LAYER[key] || DEFAULT_PARAMS; }

function loadParamsIntoSliders(key) {
  const p = paramsForLayer(key);
  const map = [['gammaSlider','gammaVal',p.gamma,2],['softSlider','softVal',p.soften,1],['sharpSlider','sharpVal',p.sharpen,2],
    ['sharpRadiusSlider','sharpRadiusVal',p.sharpenRadius,1],
    ['haloSlider','haloVal',p.halo,2],['pointIntSlider','pointIntVal',p.pointIntensity,2],
    ['pointThreshSlider','pointThreshVal',p.pointThreshold,1],['pointSizeSlider','pointSizeVal',p.pointSize,1]];
  for (const [sliderId, valId, val, digits] of map) {
    document.getElementById(sliderId).value = val;
    document.getElementById(valId).textContent = val.toFixed(digits);
  }
}

const ASTRO_STOPS = [
  [0,0,0], [0x17,0x0a,0x05], [0x4a,0x1f,0x0a], [0xa8,0x48,0x0f], [0xe8,0xa1,0x3a], [0xff,0xf3,0xd6]
];
function colorForValue(t) {
  t = Math.min(Math.max(t,0),1);
  const n = ASTRO_STOPS.length - 1;
  const idx = Math.min(Math.floor(t*n), n-1);
  const frac = t*n - idx;
  const a = ASTRO_STOPS[idx], b = ASTRO_STOPS[idx+1];
  return [a[0]+(b[0]-a[0])*frac, a[1]+(b[1]-a[1])*frac, a[2]+(b[2]-a[2])*frac];
}

function boxBlur(src, w, h, radius) {
  if (radius < 0.5) return Float32Array.from(src);
  const r = Math.round(radius);
  const tmp = new Float32Array(w*h), out = new Float32Array(w*h);
  for (let y=0;y<h;y++){
    let sum=0,count=0;
    for (let x=-r;x<=r;x++){ const xi=Math.min(Math.max(x,0),w-1); sum+=src[y*w+xi]; count++; }
    for (let x=0;x<w;x++){
      tmp[y*w+x]=sum/count;
      const xOut=Math.min(Math.max(x-r,0),w-1), xIn=Math.min(Math.max(x+r+1,0),w-1);
      sum += src[y*w+xIn]-src[y*w+xOut];
    }
  }
  for (let x=0;x<w;x++){
    let sum=0,count=0;
    for (let y=-r;y<=r;y++){ const yi=Math.min(Math.max(y,0),h-1); sum+=tmp[yi*w+x]; count++; }
    for (let y=0;y<h;y++){
      out[y*w+x]=sum/count;
      const yOut=Math.min(Math.max(y-r,0),h-1), yIn=Math.min(Math.max(y+r+1,0),h-1);
      sum += tmp[yIn*w+x]-tmp[yOut*w+x];
    }
  }
  return out;
}

function detectPeaks(values, w, h, thresholdPercentile, minDistPx) {
  const sorted = Float32Array.from(values).sort();
  const thresholdVal = sorted[Math.floor(sorted.length*thresholdPercentile/100)];
  const candidates = [];
  for (let y=1;y<h-1;y++){
    for (let x=1;x<w-1;x++){
      const v = values[y*w+x];
      if (v < thresholdVal) continue;
      let isMax = true;
      for (let dy=-1;dy<=1&&isMax;dy++) for (let dx=-1;dx<=1;dx++){
        if (dx===0&&dy===0) continue;
        if (values[(y+dy)*w+(x+dx)] > v) { isMax=false; break; }
      }
      if (isMax) candidates.push({x,y,v});
    }
  }
  candidates.sort((a,b)=>b.v-a.v);
  const selected = [];
  for (const c of candidates) {
    let tooClose = false;
    for (const s of selected) { if ((c.x-s.x)**2+(c.y-s.y)**2 < minDistPx*minDistPx) { tooClose=true; break; } }
    if (!tooClose) selected.push(c);
    if (selected.length > 400) break;
  }
  return selected;
}

function getParams() {
  return {
    gamma: parseFloat(document.getElementById('gammaSlider').value),
    soften: parseFloat(document.getElementById('softSlider').value),
    sharpen: parseFloat(document.getElementById('sharpSlider').value),
    sharpenRadius: parseFloat(document.getElementById('sharpRadiusSlider').value),
    halo: parseFloat(document.getElementById('haloSlider').value),
    pointIntensity: parseFloat(document.getElementById('pointIntSlider').value),
    pointThreshold: parseFloat(document.getElementById('pointThreshSlider').value),
    pointSize: parseFloat(document.getElementById('pointSizeSlider').value),
  };
}

// Pipeline identique à app/src/densityStyle.ts
function processDensityField(grayValues, n, params) {
  let field = params.soften > 0.05 ? boxBlur(grayValues, n, n, params.soften) : Float32Array.from(grayValues);
  if (params.sharpen > 0.01) {
    const blurred = boxBlur(field, n, n, params.sharpenRadius);
    for (let i=0;i<field.length;i++) field[i] = field[i] + params.sharpen*(field[i]-blurred[i]);
  }
  let vmin=Infinity, vmax=-Infinity;
  for (let i=0;i<field.length;i++){ if(field[i]<vmin)vmin=field[i]; if(field[i]>vmax)vmax=field[i]; }
  const span = (vmax-vmin)||1;
  const normed = new Float32Array(field.length);
  for (let i=0;i<field.length;i++) normed[i] = Math.pow(Math.min(Math.max((field[i]-vmin)/span,0),1), 1/params.gamma);

  const canvas = document.createElement('canvas');
  canvas.width = n; canvas.height = n;
  const ctx = canvas.getContext('2d');
  const out = ctx.createImageData(n,n);
  for (let i=0;i<normed.length;i++){
    const [r,g,b] = colorForValue(normed[i]);
    out.data[i*4]=r; out.data[i*4+1]=g; out.data[i*4+2]=b; out.data[i*4+3]=255;
  }
  ctx.putImageData(out,0,0);

  if (params.halo > 0.02) {
    const bright = new Float32Array(normed.length);
    for (let i=0;i<normed.length;i++) bright[i] = Math.max(normed[i]-0.55,0)*2.2;
    const bloomed = boxBlur(bright, n, n, 6);
    const bloomCanvas = document.createElement('canvas');
    bloomCanvas.width=n; bloomCanvas.height=n;
    const bctx = bloomCanvas.getContext('2d');
    const bout = bctx.createImageData(n,n);
    for (let i=0;i<bloomed.length;i++){
      const v = Math.min(bloomed[i]*params.halo,1);
      const [r,g,b] = colorForValue(Math.min(normed[i]+v,1));
      bout.data[i*4]=r; bout.data[i*4+1]=g; bout.data[i*4+2]=b; bout.data[i*4+3]=v*255;
    }
    bctx.putImageData(bout,0,0);
    ctx.drawImage(bloomCanvas,0,0);
  }

  if (params.pointIntensity > 0.02) {
    const peaks = detectPeaks(normed, n, n, params.pointThreshold, params.pointSize*1.5);
    for (const p of peaks) {
      const [r,g,b] = colorForValue(1);
      const grad = ctx.createRadialGradient(p.x,p.y,0,p.x,p.y,params.pointSize);
      grad.addColorStop(0, `rgba(${r},${g},${b},${Math.min(params.pointIntensity,1)})`);
      grad.addColorStop(1, `rgba(${r},${g},${b},0)`);
      ctx.fillStyle = grad;
      ctx.beginPath(); ctx.arc(p.x,p.y,params.pointSize,0,Math.PI*2); ctx.fill();
    }
  }
  return canvas;
}

let grayCache = {};
let processedCache = {};

function loadLayer(idx, onDone) {
  const key = LAYERS[idx].key;
  if (grayCache[key]) { onDone(); return; }
  const img = new Image();
  img.src = `data/density_${key}.png`;
  img.onload = () => {
    const n = img.naturalWidth;
    const off = document.createElement('canvas');
    off.width = n; off.height = n;
    const octx = off.getContext('2d');
    octx.drawImage(img, 0, 0);
    const gray = octx.getImageData(0,0,n,n);
    const values = new Float32Array(n*n);
    for (let i=0;i<values.length;i++) values[i] = gray.data[i*4]/255;
    grayCache[key] = values;
    onDone();
  };
}

function reprocessCurrentLayer() {
  const key = LAYERS[currentLayerIdx].key;
  const gray = grayCache[key];
  if (!gray) return;
  const n = Math.round(Math.sqrt(gray.length));
  processedCache[key] = processDensityField(gray, n, getParams());
  draw();
}

function draw() {
  const canvas = document.getElementById('canvas');
  const W = Math.round(window.innerWidth * DPR);
  const H = Math.round(window.innerHeight * DPR);
  if (canvas.width !== W) canvas.width = W;
  if (canvas.height !== H) canvas.height = H;
  const ctx = canvas.getContext('2d');
  ctx.clearRect(0,0,W,H);
  ctx.fillStyle = '#05050a';
  ctx.fillRect(0,0,W,H);

  const layer = LAYERS[currentLayerIdx];
  const source = processedCache[layer.key];
  if (!source) return;

  // Zoom : le curseur (0-1) est mappé en log sur [maxMpc/12, maxMpc*1.3]
  const zt = parseFloat(document.getElementById('zoomSlider').value);
  const logMin = Math.log10(layer.maxMpc / 12);
  const logMax = Math.log10(layer.maxMpc * 1.3);
  const halfWidthMpc = Math.pow(10, logMin + zt*(logMax-logMin));
  document.getElementById('zoomVal').textContent = halfWidthMpc.toFixed(3) + ' Mpc';

  const n = source.width;
  const texturePxPerMpc = n / (2 * layer.maxMpc * marginFor(layer.key));
  const shortSide = Math.min(W, H);
  const halfWidthMpcX = (W/shortSide) * halfWidthMpc;
  const halfWidthMpcY = (H/shortSide) * halfWidthMpc;

  let cropW = 2*halfWidthMpcX*texturePxPerMpc;
  let cropH = 2*halfWidthMpcY*texturePxPerMpc;
  let destX=0, destY=0, destW=W, destH=H;
  const overshoot = Math.max(cropW/n, cropH/n, 1);
  if (overshoot > 1) {
    cropW /= overshoot; cropH /= overshoot;
    destW = W/overshoot; destH = H/overshoot;
    destX = (W-destW)/2; destY = (H-destH)/2;
  }
  const startX = (n-cropW)/2, startY = (n-cropH)/2;
  ctx.drawImage(source, startX, startY, cropW, cropH, destX, destY, destW, destH);

  document.getElementById('stat').textContent = `${layer.key} — ${Math.round(W/DPR)}×${Math.round(H/DPR)} CSS, DPR=${DPR.toFixed(2)}`;
}

function buildLayerButtons() {
  const row = document.getElementById('layerRow');
  row.innerHTML = '';
  LAYERS.forEach((l, i) => {
    const btn = document.createElement('button');
    btn.textContent = l.key;
    if (i === currentLayerIdx) btn.classList.add('active');
    btn.onclick = () => {
      currentLayerIdx = i;
      buildLayerButtons();
      loadParamsIntoSliders(LAYERS[i].key);
      loadLayer(i, reprocessCurrentLayer);
    };
    row.appendChild(btn);
  });
}

function bind(id, valId, digits) {
  const el = document.getElementById(id);
  el.addEventListener('input', () => {
    if (valId) document.getElementById(valId).textContent = parseFloat(el.value).toFixed(digits);
    if (id === 'zoomSlider') draw();
    else reprocessCurrentLayer();
  });
}
['gammaSlider','softSlider','sharpSlider','sharpRadiusSlider','haloSlider','pointIntSlider','pointThreshSlider','pointSizeSlider'].forEach((id,i) => {
  const valIds = ['gammaVal','softVal','sharpVal','sharpRadiusVal','haloVal','pointIntVal','pointThreshVal','pointSizeVal'];
  const digitsArr = [2,1,2,1,2,2,1,1];
  bind(id, valIds[i], digitsArr[i]);
});
bind('zoomSlider', null, 0);

document.getElementById('gearBtn').addEventListener('click', () => {
  const panel = document.getElementById('panel');
  panel.style.display = panel.style.display === 'none' ? 'block' : 'none';
});

window.addEventListener('resize', draw);

buildLayerButtons();
loadParamsIntoSliders(LAYERS[currentLayerIdx].key);
loadLayer(currentLayerIdx, reprocessCurrentLayer);
</script>
</body>
</html>
