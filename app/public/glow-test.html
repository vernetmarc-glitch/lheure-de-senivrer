<!doctype html>
<html lang="fr">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Calibration — Groupe Local vs densité L2</title>
<style>
  html, body { margin: 0; padding: 0; background: #05050a; color: #eee; font-family: system-ui, sans-serif; height: 100%; overflow: hidden; }
  .wrap { padding: 8px 10px; display: flex; flex-direction: column; height: 100dvh; box-sizing: border-box; }
  h1 { font-size: 11px; font-weight: 600; margin: 0 0 3px; color: #ccc; }
  p.note { font-size: 9px; color: #888; margin: 0 0 6px; }
  .views { display: flex; gap: 6px; }
  .view { flex: 1; min-width: 0; }
  .view h2 { font-size: 9px; color: #999; margin: 0 0 2px; font-weight: 500; }
  canvas { width: 100%; aspect-ratio: 1/1; background: #000; border-radius: 6px; display: block; }
  .stat { font-size: 9px; color: #777; margin-top: 2px; font-family: monospace; }
  .controls { margin-top: 8px; flex: 1; overflow: hidden; display: flex; flex-direction: column; gap: 6px; }
  .ctrl { display: flex; align-items: center; gap: 6px; }
  .ctrl label { font-size: 10px; color: #bbb; width: 150px; flex-shrink: 0; line-height: 1.2; }
  .ctrl input[type=range] { flex: 1; height: 20px; }
  .ctrl .val { font-size: 10px; color: #7fd1ff; width: 34px; flex-shrink: 0; text-align: right; font-family: monospace; }
</style>
</head>
<body>
<div class="wrap">
  <h1>Calibration Groupe Local ↔ densité L2 — 10 Mpc de demi-champ</h1>
  <p class="note">Les deux vues sont calculées à partir du MÊME catalogue de points, aucun bruit indépendant.</p>

  <div class="views">
    <div class="view">
      <h2>Densité (KDE du catalogue)</h2>
      <canvas id="canvasDensity" width="256" height="256"></canvas>
      <div class="stat" id="statDensity"></div>
    </div>
    <div class="view">
      <h2>Galaxies simulées (glow)</h2>
      <canvas id="canvasPoints" width="256" height="256"></canvas>
      <div class="stat" id="statPoints"></div>
    </div>
  </div>

  <div class="controls">
    <div class="ctrl">
      <label>Taille des galaxies (Mpc)</label>
      <input type="range" id="sizeSlider" min="0.05" max="1.5" step="0.01" value="0.3" />
      <span class="val" id="sizeVal">0.30</span>
    </div>
    <div class="ctrl">
      <label>Contraste / amplitude</label>
      <input type="range" id="ampSlider" min="0.5" max="6" step="0.1" value="3" />
      <span class="val" id="ampVal">3.0</span>
    </div>
    <div class="ctrl">
      <label>Glow au bord (10 Mpc)</label>
      <input type="range" id="glowEdgeSlider" min="0.3" max="4" step="0.1" value="1.5" />
      <span class="val" id="glowEdgeVal">1.5</span>
    </div>
    <div class="ctrl">
      <label>Glow au centre (0 Mpc)</label>
      <input type="range" id="glowCenterSlider" min="0.1" max="4" step="0.1" value="0.8" />
      <span class="val" id="glowCenterVal">0.8</span>
    </div>
    <div class="ctrl">
      <label>Position simulée</label>
      <input type="range" id="posSlider" min="0" max="1" step="0.01" value="1" />
      <span class="val" id="posVal">1.00</span>
    </div>
  </div>
</div>

<script>
const HALF_WIDTH_MPC = 10;
const GRID_N = 200; // résolution de calcul de la KDE (indépendante de L2 : plus de dépendance au bruit)

const ASTRO_STOPS = [
  [0,0,0], [0x17,0x0a,0x05], [0x4a,0x1f,0x0a], [0xa8,0x48,0x0f], [0xe8,0xa1,0x3a], [0xff,0xf3,0xd6]
];
function colorForValue(t) {
  t = Math.min(Math.max(t,0),1);
  const n = ASTRO_STOPS.length - 1;
  const idx = Math.min(Math.floor(t*n), n-1);
  const frac = t*n - idx;
  const a = ASTRO_STOPS[idx], b = ASTRO_STOPS[idx+1];
  return [a[0]+(b[0]-a[0])*frac, a[1]+(b[1]-a[1])*frac, a[2]+(b[2]-a[2])*frac];
}
function averageBrightness(ctx, size) {
  const data = ctx.getImageData(0,0,size,size).data;
  let sum = 0;
  for (let i=0;i<data.length;i+=4) sum += (data[i]+data[i+1]+data[i+2])/3;
  return sum / (data.length/4);
}

let catalog = [];
fetch('data/local_group_catalog.json').then(r=>r.json()).then(data => {
  catalog = data.filter(g => g.distanceMpc <= HALF_WIDTH_MPC * 1.05);
  drawAll();
});

// --- Vue gauche : KDE — somme de gaussiennes CENTRÉES AUX MÊMES POSITIONS
// que les points de droite. Aucune autre source de données. ---
function drawDensity() {
  const canvas = document.getElementById('canvasDensity');
  const ctx = canvas.getContext('2d');
  if (!catalog.length) return;

  const sigmaMpc = parseFloat(document.getElementById('sizeSlider').value);
  const amp = parseFloat(document.getElementById('ampSlider').value);
  const pixelSizeMpc = (2*HALF_WIDTH_MPC) / GRID_N;

  const field = new Float64Array(GRID_N*GRID_N);
  for (const gal of catalog) {
    const rad = gal.angleDeg*Math.PI/180;
    const gx = Math.cos(rad)*gal.distanceMpc;
    const gy = Math.sin(rad)*gal.distanceMpc;
    const peakAmp = Math.log(1 + gal.brightness*amp);
    // Limiter le calcul au voisinage de la galaxie (perf)
    const spanPx = Math.ceil((sigmaMpc*4)/pixelSizeMpc);
    const cx = Math.round(GRID_N/2 + gx/pixelSizeMpc);
    const cy = Math.round(GRID_N/2 + gy/pixelSizeMpc);
    for (let y=Math.max(0,cy-spanPx); y<Math.min(GRID_N,cy+spanPx); y++){
      for (let x=Math.max(0,cx-spanPx); x<Math.min(GRID_N,cx+spanPx); x++){
        const xMpc = (x-GRID_N/2)*pixelSizeMpc, yMpc = (y-GRID_N/2)*pixelSizeMpc;
        const d2 = (xMpc-gx)**2 + (yMpc-gy)**2;
        field[y*GRID_N+x] += peakAmp * Math.exp(-d2/(2*sigmaMpc*sigmaMpc));
      }
    }
  }

  let vmax = 0;
  for (let i=0;i<field.length;i++) if (field[i]>vmax) vmax=field[i];
  vmax = Math.max(vmax, 0.01);

  const tmp = document.createElement('canvas');
  tmp.width = GRID_N; tmp.height = GRID_N;
  const tctx = tmp.getContext('2d');
  const out = tctx.createImageData(GRID_N, GRID_N);
  for (let i=0;i<field.length;i++){
    const v = field[i]/vmax;
    const [r,g,b] = colorForValue(v);
    out.data[i*4]=r; out.data[i*4+1]=g; out.data[i*4+2]=b; out.data[i*4+3]=255;
  }
  tctx.putImageData(out,0,0);

  ctx.clearRect(0,0,canvas.width,canvas.height);
  ctx.imageSmoothingEnabled = true;
  ctx.drawImage(tmp, 0, 0, canvas.width, canvas.height);
  document.getElementById('statDensity').textContent = 'Moy. ' + averageBrightness(ctx, canvas.width).toFixed(0) + '/255';
}

// --- Vue droite : mêmes points, rendus en glow ponctuel ---
function drawPoints() {
  const canvas = document.getElementById('canvasPoints');
  const ctx = canvas.getContext('2d');
  const size = canvas.width;
  ctx.clearRect(0,0,size,size);
  ctx.fillStyle = 'rgb(0,0,0)';
  ctx.fillRect(0,0,size,size);
  if (!catalog.length) return;

  const scale = size/2/HALF_WIDTH_MPC;
  const originX = size/2, originY = size/2;
  const sigmaMpc = parseFloat(document.getElementById('sizeSlider').value);
  const amp = parseFloat(document.getElementById('ampSlider').value);
  const glowEdge = parseFloat(document.getElementById('glowEdgeSlider').value);
  const glowCenter = parseFloat(document.getElementById('glowCenterSlider').value);
  const pos = parseFloat(document.getElementById('posSlider').value);
  const glow = glowEdge + (glowCenter - glowEdge) * pos;

  for (const gal of catalog) {
    const rad = gal.angleDeg*Math.PI/180;
    const x = originX + Math.cos(rad)*gal.distanceMpc*scale;
    const y = originY + Math.sin(rad)*gal.distanceMpc*scale;
    const rPx = sigmaMpc * scale * glow * 2.2; // ~ portée visuelle équivalente à la gaussienne (2.2 sigma)
    if (x<-rPx || x>size+rPx || y<-rPx || y>size+rPx) continue;

    const peak = Math.min(Math.log(1+gal.brightness*amp)/Math.log(1+amp), 1);
    const [r,g,b] = colorForValue(peak);
    const gradient = ctx.createRadialGradient(x,y,0,x,y,rPx);
    gradient.addColorStop(0, `rgba(${r},${g},${b},0.95)`);
    gradient.addColorStop(0.5, `rgba(${r},${g},${b},0.35)`);
    gradient.addColorStop(1, `rgba(${r},${g},${b},0)`);
    ctx.fillStyle = gradient;
    ctx.beginPath();
    ctx.arc(x,y,rPx,0,Math.PI*2);
    ctx.fill();
  }
  document.getElementById('statPoints').textContent = 'Moy. ' + averageBrightness(ctx, size).toFixed(0) + '/255';
}

function drawAll(){ drawDensity(); drawPoints(); }

function bind(id, labelId, digits, onInput) {
  const el = document.getElementById(id);
  const label = document.getElementById(labelId);
  el.addEventListener('input', () => {
    label.textContent = parseFloat(el.value).toFixed(digits);
    onInput();
  });
}
bind('sizeSlider','sizeVal',2, drawAll);
bind('ampSlider','ampVal',1, drawAll);
bind('glowEdgeSlider','glowEdgeVal',1, drawPoints);
bind('glowCenterSlider','glowCenterVal',1, drawPoints);
bind('posSlider','posVal',2, drawPoints);
</script>
</body>
</html>
