<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Matrice zoom × temps — prototype de validation</title>
<style>
  body { margin: 0; background: #05050a; color: #cfc8bd; font-family: system-ui, sans-serif;
         display: flex; flex-direction: column; align-items: center; gap: 14px; padding: 18px; }
  h1 { font-size: 15px; font-weight: 500; letter-spacing: 0.06em; color: #e8dcc8; margin: 0; }
  canvas { image-rendering: pixelated; width: min(90vw, 600px); height: min(90vw, 600px);
           border: 1px solid #2a2a35; border-radius: 4px; }
  .panel { width: min(90vw, 600px); display: flex; flex-direction: column; gap: 10px; }
  label { font-size: 12px; display: flex; justify-content: space-between; }
  .val { color: #e8a13a; font-variant-numeric: tabular-nums; }
  input[type=range] { width: 100%; }
  #meta { font-size: 11px; color: #8a8478; line-height: 1.5; min-height: 3em;
          font-variant-numeric: tabular-nums; }
  button { background: #1a1a24; color: #cfc8bd; border: 1px solid #3a3a48; border-radius: 4px;
           padding: 6px 14px; cursor: pointer; font-size: 12px; }
  button:hover { border-color: #e8a13a; }
  #loading { font-size: 12px; color: #8a8478; }
</style>
</head>
<body>
<h1>MATRICE ZOOM × TEMPS — prototype de validation des paramètres (§11.6)</h1>
<div id="loading">Chargement des frames…</div>
<canvas id="cv" width="300" height="300"></canvas>
<div class="panel">
  <label>Zoom — demi-champ demandé (Mpc comobiles) <span class="val" id="zoomVal"></span></label>
  <input type="range" id="zoomSlider" min="-1.699" max="4.1635" step="0.01" value="0" />
  <label>Temps cosmique (milliards d'années) <span class="val" id="aVal"></span></label>
  <input type="range" id="aSlider" min="0.000365" max="13.7903" step="0.002" value="13.7903" />
  <div style="display:flex; gap:8px;">
    <button id="playBtn">▶ Lecture temporelle</button>
    <button id="resetBtn">a = 1 (aujourd'hui)</button>
  </div>
  <div id="meta"></div>
</div>

<script src="spacetime-shared.js"></script>
<script>
'use strict'
// ═════════════════════════════════════════════════════════════════════
// Prototype de balayage COMPLET de la matrice zoom × temps.
// Toutes les valeurs viennent de data/spacetime_matrix.json (source de
// vérité versionnée) — AUCUN paramètre redéfini ici. Le pipeline de
// composition est le portage 1:1 de scripts/dev/validate_spacetime_matrix.py
// (qui l'a validé par le calcul avant ce prototype, §13).
// Deux types de contenu seulement (§11.1) : frames de champ de densité
// cuites hors-ligne + sprites N-corps ; combinés en "screen" (§11.3),
// embrasement par canal saturant (§11.4.c), palette au runtime.
// ═════════════════════════════════════════════════════════════════════
const CANVAS_N = 300
const cv = document.getElementById('cv')
const ctx = cv.getContext('2d')

const ASTRO_STOPS = [
  [0,0,0], [0x17,0x0a,0x05], [0x4a,0x1f,0x0a], [0xa8,0x48,0x0f], [0xe8,0xa1,0x3a], [0xff,0xf3,0xd6]
]
function colorForValue(t) {
  t = Math.min(Math.max(t,0),1)
  const n = ASTRO_STOPS.length - 1
  const idx = Math.min(Math.floor(t*n), n-1)
  const frac = t*n - idx
  const a = ASTRO_STOPS[idx], b = ASTRO_STOPS[idx+1]
  return [a[0]+(b[0]-a[0])*frac, a[1]+(b[1]-a[1])*frac, a[2]+(b[2]-a[2])*frac]
}

let MATRIX = null, COSMO = null
const FRAMES = {}         // key -> [Float32Array 512²]
const SPRITE_FRAMES = {}  // slug -> [{arr,n}] (126 sprites cuits)
let framesTotal = 0, framesLoaded = 0

// Mapping temps cosmique (table Planck) — curseur LINÉAIRE en Gyr (matrice v2)
function aOfT(t) {
  const r = COSMO
  if (t <= r[0].t_Gyr) return r[0].a
  for (let i = 0; i < r.length - 1; i++) {
    if (t >= r[i].t_Gyr && t <= r[i + 1].t_Gyr) {
      const f = (t - r[i].t_Gyr) / (r[i + 1].t_Gyr - r[i].t_Gyr)
      return r[i].a + (r[i + 1].a - r[i].a) * f
    }
  }
  return r[r.length - 1].a
}
function zOfA(a) { return 1 / a - 1 }

function loadFrame(url) {
  return new Promise((resolve, reject) => {
    const img = new Image()
    img.onload = () => {
      const c = document.createElement('canvas')
      c.width = c.height = img.width
      const g = c.getContext('2d')
      g.drawImage(img, 0, 0)
      const data = g.getImageData(0, 0, img.width, img.height).data
      const arr = new Float32Array(img.width * img.width)
      for (let i = 0; i < arr.length; i++) arr[i] = data[i*4] / 255
      framesLoaded++
      document.getElementById('loading').textContent =
        `Chargement des frames… ${framesLoaded}/${framesTotal}`
      resolve({ arr, n: img.width })
    }
    img.onerror = reject
    img.src = url
  })
}

async function boot() {
  MATRIX = await (await fetch('data/spacetime_matrix.json')).json()
  COSMO = (await (await fetch('data/cosmology_table.json')).json()).rows
  const nSpr = MATRIX.sprites.n_frames
  framesTotal = MATRIX.layers.reduce((s, l) => s + l.keyframes_a.length, 0)
    + MATRIX.real_galaxies.entries.length * nSpr
  await Promise.all([
    ...MATRIX.layers.map(async (l) => {
      FRAMES[l.key] = await Promise.all(
        l.keyframes_a.map((_, i) => loadFrame('data/st_' + l.key + '_k' + String(i).padStart(2,'0') + '.png')))
    }),
    ...MATRIX.real_galaxies.entries.map(async (g) => {
      SPRITE_FRAMES[g.slug] = await Promise.all(
        Array.from({ length: nSpr }, (_, i) =>
          loadFrame('data/dissolution_sprites/' + g.slug + '_f' + String(i).padStart(2,'0') + '.png')))
    }),
  ])
  document.getElementById('loading').textContent = ''
  render()
}

// ── Poids de layers — port de layerWeights.ts, frontières lues dans la
// matrice. Simplification prototype : le poids "milkyway" est reporté sur
// "localgroup" (la Voie lactée est rendue par son sprite N-corps).
function layerWeights(hw) {
  const ZA = MATRIX.zoom_axis
  const x = Math.log10(Math.max(hw, 1e-6))
  const gates = ZA.layer_edges_mpc.map((e, i) => {
    const f = ZA.fade_widths_dex[i]
    return SpacetimeShared.smoothstep((x - (Math.log10(e) - f)) / (2 * f))
  })
  const weights = {}
  let remaining = 1
  for (let i = 0; i < ZA.layer_order.length - 1; i++) {
    weights[ZA.layer_order[i]] = remaining * (1 - gates[i])
    remaining *= gates[i]
  }
  weights[ZA.layer_order[ZA.layer_order.length - 1]] = remaining
  weights.localgroup = (weights.localgroup || 0) + (weights.milkyway || 0)
  delete weights.milkyway
  for (const k of Object.keys(weights)) if (weights[k] < 1e-3) delete weights[k]
  return weights
}

// Échantillonnage bilinéaire d'une frame 512² à (u,v) ∈ [0,1], clamp aux bords.
function sampleBilinear(frame, n, u, v) {
  const fx = Math.min(Math.max(u, 0), 1) * (n - 1)
  const fy = Math.min(Math.max(v, 0), 1) * (n - 1)
  const x0 = Math.floor(fx), y0 = Math.floor(fy)
  const x1 = Math.min(x0 + 1, n - 1), y1 = Math.min(y0 + 1, n - 1)
  const tx = fx - x0, ty = fy - y0
  const a = frame[y0*n+x0], b = frame[y0*n+x1], c = frame[y1*n+x0], d = frame[y1*n+x1]
  return (a + (b-a)*tx) * (1-ty) + (c + (d-c)*tx) * ty
}

// Paire de frames temporelles encadrant a pour un layer (+ facteur de mix).
function framePairFor(layer, a) {
  const kfs = layer.keyframes_a, imgs = FRAMES[layer.key]
  if (a <= kfs[0]) return { f0: imgs[0], f1: imgs[0], mix: 0 }
  if (a >= kfs[kfs.length-1]) return { f0: imgs[imgs.length-1], f1: imgs[imgs.length-1], mix: 0 }
  let i1 = kfs.findIndex(k => k >= a)
  const i0 = i1 - 1
  const mix = (Math.log10(a) - Math.log10(kfs[i0])) / (Math.log10(kfs[i1]) - Math.log10(kfs[i0]))
  return { f0: imgs[i0], f1: imgs[i1], mix }
}

// Sprites N-corps CUITS (matrice v2) — port 1:1 de
// spacetime_pipeline.composite_sprites. progress = 1−A_gal(a) ;
// extinction A_gal^fade_exponent (les sprites se dissolvent dans le fond
// AVANT le fond) ; visibilité fondue sur visible_fade_band_mpc ; plancher
// de lisibilité sur le CŒUR (min_render_core_px × halfwidth_units).
function spriteVisibility(hwEff) {
  const [lo, hi] = MATRIX.sprites.visible_fade_band_mpc
  return 1 - SpacetimeShared.smoothstep(
    (Math.log10(Math.max(hwEff, 1e-6)) - Math.log10(lo)) / (Math.log10(hi) - Math.log10(lo)))
}

function compositeSprites(bg, a, hwEff) {
  const SPR = MATRIX.sprites
  const ag = SpacetimeShared.structureAmplitude(MATRIX.galaxy_scale_mpc, a)
  const fade = Math.pow(ag, SPR.fade_exponent) * spriteVisibility(hwEff)
  if (fade <= 1e-4) return bg
  const progress = 1 - ag
  const fpos = progress * (SPR.n_frames - 1)
  const i0 = Math.min(Math.floor(fpos), SPR.n_frames - 2)
  const mix = fpos - i0
  const pxPerMpc = CANVAS_N / (2 * hwEff)
  const cx = CANVAS_N / 2, cy = CANVAS_N / 2
  const out = Float32Array.from(bg)
  for (const g of MATRIX.real_galaxies.entries) {
    const f0 = SPRITE_FRAMES[g.slug][i0], f1 = SPRITE_FRAMES[g.slug][i0 + 1]
    const n = f0.n
    const rad = g.angle_deg * Math.PI / 180
    const gx = cx + Math.cos(rad) * g.distance_mpc * pxPerMpc
    const gy = cy + Math.sin(rad) * g.distance_mpc * pxPerMpc
    const halfPx = Math.max(g.sprite_halfwidth_mpc * pxPerMpc,
                            SPR.min_render_core_px * g.sprite_halfwidth_units)
    const x0 = Math.max(0, Math.floor(gx - halfPx))
    const x1 = Math.min(CANVAS_N, Math.ceil(gx + halfPx) + 1)
    const y0 = Math.max(0, Math.floor(gy - halfPx))
    const y1 = Math.min(CANVAS_N, Math.ceil(gy + halfPx) + 1)
    if (x1 <= x0 || y1 <= y0 || halfPx <= 0) continue
    for (let y = y0; y < y1; y++) {
      const v = (y + 0.5 - gy) / (2 * halfPx) + 0.5
      if (v < 0 || v > 1) continue
      for (let x = x0; x < x1; x++) {
        const u = (x + 0.5 - gx) / (2 * halfPx) + 0.5
        if (u < 0 || u > 1) continue
        const t0 = sampleBilinear(f0.arr, n, u, v)
        const t1 = mix > 0 ? sampleBilinear(f1.arr, n, u, v) : t0
        const tone = (t0 + (t1 - t0) * mix) * fade
        const idx = y * CANVAS_N + x
        out[idx] = 1 - (1 - out[idx]) * (1 - tone)   // "screen", §11.3
      }
    }
  }
  return out
}

// Calcul PUR du champ de tons pour une cellule (hw, a) — séparé du DOM
// pour être exécutable et VALIDABLE hors navigateur (Node), cf. §13.
function computeTone(hw, a) {
  // Effet d'expansion PAR ÉCHELLE (matrice v2, §11.4.e) — nœuds interpolés,
  // piloté par le demi-champ DEMANDÉ (les échelles liées ne bougent pas).
  const hwEff = SpacetimeShared.effectiveHalfWidthMpcNodes(hw, a, MATRIX.expansion.nodes)
  const weights = layerWeights(hwEff)
  const layersByKey = {}
  for (const l of MATRIX.layers) layersByKey[l.key] = l

  // 1. Fond : somme pondérée (fondu de zoom de production) des frames
  // temporelles interpolées de chaque layer actif.
  const bg = new Float32Array(CANVAS_N * CANVAS_N)
  const active = []
  for (const key of Object.keys(weights)) {
    const layer = layersByKey[key]
    const w = weights[key]
    const pair = framePairFor(layer, a)
    const n = 512
    const extent = layer.max_mpc * layer.margin_factor // demi-étendue comobile
    active.push({ key, w, A: SpacetimeShared.structureAmplitude(layer.max_mpc, a) })
    for (let y = 0; y < CANVAS_N; y++) {
      const vMpc = ((y + 0.5) / CANVAS_N * 2 - 1) * hwEff
      const v = vMpc / (2 * extent) + 0.5
      for (let x = 0; x < CANVAS_N; x++) {
        const uMpc = ((x + 0.5) / CANVAS_N * 2 - 1) * hwEff
        const u = uMpc / (2 * extent) + 0.5
        const t0 = sampleBilinear(pair.f0.arr, n, u, v)
        const t1 = pair.mix > 0 ? sampleBilinear(pair.f1.arr, n, u, v) : t0
        bg[y*CANVAS_N+x] += w * (t0 + (t1 - t0) * pair.mix)
      }
    }
  }

  // 2. Sprites N-corps cuits (Groupe Local) — mélange "screen" (§11.3).
  const tone = compositeSprites(bg, a, hwEff)

  // 3. Embrasement (§11.4.c) : canal saturant en "screen", pas de calque
  // de couleur.
  const EMB = MATRIX.embrasement
  const fade = 1 - SpacetimeShared.structureAmplitude(EMB.fade_scale_mpc, Math.min(a * EMB.a_multiplier, 1))
  const white = 1 - Math.exp(-Math.pow(fade, EMB.exp) * EMB.offset_max)
  const finalTone = new Float32Array(tone.length)
  for (let i = 0; i < tone.length; i++) finalTone[i] = 1 - (1 - tone[i]) * (1 - white)
  return { tone: finalTone, white, hwEff, active }
}

function render() {
  if (!MATRIX || framesLoaded < framesTotal) return
  const hw = Math.pow(10, parseFloat(document.getElementById('zoomSlider').value))
  const tGyr = parseFloat(document.getElementById('aSlider').value)
  const a = Math.min(aOfT(tGyr), 1)
  const { tone, white, hwEff, active } = computeTone(hw, a)

  const out = ctx.createImageData(CANVAS_N, CANVAS_N)
  for (let i = 0; i < tone.length; i++) {
    const [r,g,b] = colorForValue(tone[i])
    out.data[i*4] = Math.round(r); out.data[i*4+1] = Math.round(g)
    out.data[i*4+2] = Math.round(b); out.data[i*4+3] = 255
  }
  ctx.putImageData(out, 0, 0)

  document.getElementById('zoomVal').textContent =
    hw >= 100 ? Math.round(hw) + ' Mpc' : hw.toFixed(2) + ' Mpc'
  document.getElementById('aVal').textContent =
    (tGyr < 0.01 ? (tGyr * 1000).toFixed(1) + ' Ma' : tGyr.toFixed(2) + ' Ga') +
    ' · z=' + (zOfA(a) >= 100 ? Math.round(zOfA(a)) : zOfA(a).toFixed(2)) + ' · a=' + a.toPrecision(3)
  document.getElementById('meta').innerHTML =
    `demi-champ effectif (compression §11.4.e) : ${hwEff >= 100 ? Math.round(hwEff) : hwEff.toFixed(2)} Mpc · embrasement ${(white*100).toFixed(0)}%<br/>` +
    'layers actifs : ' + active.map(l => `${l.key} (poids ${l.w.toFixed(2)}, A=${l.A.toFixed(2)})`).join(' · ') +
    (hwEff < MATRIX.sprites.visible_below_halfwidth_mpc ? ' · + sprites N-corps' : '')
}

document.getElementById('zoomSlider').addEventListener('input', render)
document.getElementById('aSlider').addEventListener('input', render)
document.getElementById('resetBtn').addEventListener('click', () => {
  document.getElementById('aSlider').value = document.getElementById('aSlider').max; render()
})

let playing = false
document.getElementById('playBtn').addEventListener('click', () => {
  playing = !playing
  document.getElementById('playBtn').textContent = playing ? '⏸ Pause' : '▶ Lecture temporelle'
  if (playing) {
    const slider = document.getElementById('aSlider')
    const T_MIN = parseFloat(slider.min), T_MAX = parseFloat(slider.max)
    let start = null
    const DURATION = 14000   // lecture LINÉAIRE en temps cosmique (matrice v2)
    slider.value = T_MIN
    function step(ts) {
      if (!playing) return
      if (start === null) start = ts
      const frac = Math.min((ts - start) / DURATION, 1)
      slider.value = T_MIN + (T_MAX - T_MIN) * frac
      render()
      if (frac < 1) requestAnimationFrame(step)
      else { playing = false; document.getElementById('playBtn').textContent = '▶ Lecture temporelle' }
    }
    requestAnimationFrame(step)
  }
})

boot()
</script>
</body>
</html>
